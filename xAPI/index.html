<!DOCTYPE html>
<html>
<head>
    <title>My Activity</title>
    <!-- xAPI library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xapijs/1.0.0/xapi.min.js"></script>
</head>
<body>
    <h1>Welcome to the activity</h1>
    <button onclick="completeActivity()">Mark Complete</button>

    <script>
        // Send xAPI statement when student completes
        function completeActivity() {
            var statement = {
                actor: {
                    mbox: "mailto:student@example.com",
                    name: "Student Name"
                },
                verb: {
                    id: "http://adlnet.gov/expapi/verbs/completed",
                    display: { "en-US": "completed" }
                },
                object: {
                    id: "http://your-ilias.com/activities/my-activity-1",
                    definition: {
                        name: { "en-US": "My Activity" }
                    }
                }
            };
            // Send to LRS
            ADL.XAPIWrapper.sendStatement(statement);
        }
    </script>
</body>
</html>
